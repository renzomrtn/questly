services:
  backend:
    build: ./questly-backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

  frontend:
    build: ./questly-frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: questly
      POSTGRES_USER: questly
      POSTGRES_PASSWORD: questly
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: