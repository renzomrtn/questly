services:
  backend:
    build: ./questly-backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - sqlite_data:/data   # ← persists your .db file

  frontend:
    build: ./questly-frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000    # browser → backend
      - NUXT_API_BASE=http://backend:8000             # server-side → backend
    depends_on:
      - backend

volumes:
  sqlite_data: